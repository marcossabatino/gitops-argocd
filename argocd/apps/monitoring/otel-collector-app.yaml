apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # Junto com Tempo — ambos dependem do Prometheus
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: portfolio

  sources:
    - chart: opentelemetry-collector
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: ">=0.110.0"
      helm:
        valueFiles:
          - $values/kubernetes/monitoring/otel-collector/values.yaml

    - repoURL: https://github.com/SEU_USUARIO/gitops-argocd
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
