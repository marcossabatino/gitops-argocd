apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: java-app
  namespace: apps
  labels:
    app: java-app
    version: v1
spec:
  replicas: 2
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: java-app

  strategy:
    canary:
      # Passos do canary: enviar % crescente do tráfego para a nova versão
      steps:
        - setWeight: 20          # 20% do tráfego para a nova versão
        - pause: {duration: 60s} # Aguarda 60s antes de analisar
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: app
                value: java-app
        - setWeight: 50          # 50% após análise passar
        - pause: {duration: 60s}
        - setWeight: 100         # 100% — promoção completa

      # Rollback automático se a análise falhar
      analysis:
        startingStep: 2

  template:
    metadata:
      labels:
        app: java-app
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: java-app
          image: java-app:latest   # Kustomize overlay substitui pelo ECR
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/otel-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: "java-app"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_TRACE_SAMPLER
              value: "always_on"
            - name: SPRING_APPLICATION_NAME
              value: "java-app"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
