apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-app
  namespace: apps
  labels:
    app: go-app
spec:
  replicas: 2
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: go-app

  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 60s}
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: app
                value: go-app
        - setWeight: 50
        - pause: {duration: 60s}
        - setWeight: 100

  template:
    metadata:
      labels:
        app: go-app
        version: v1
    spec:
      containers:
        - name: go-app
          image: go-app:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "go-app"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
